# https://docs.github.com/en/actions

name: "Integrate"

on: # yamllint disable-line rule:truthy
  pull_request: null
  push:
    branches:
      - "main"
  workflow_call: null

jobs:
  code-coverage:
    name: "Code Coverage"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "xdebug"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Set up problem matchers for phpunit/phpunit"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/phpunit.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Collect code coverage with Xdebug and phpunit/phpunit"
        env:
          XDEBUG_MODE: "coverage"
        run: "vendor/bin/phpunit --colors=always --configuration=test/Unit/phpunit.xml --coverage-clover=.build/phpunit/logs/clover.xml"

      - name: "Send code coverage report to codecov.io"
        uses: "codecov/codecov-action@v6.0.0"
        with:
          files: ".build/phpunit/logs/clover.xml"
          token: "${{ secrets.CODECOV_TOKEN }}"

  coding-standards:
    name: "Coding Standards"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Lint YAML files"
        uses: "ibiqlik/action-yamllint@v3.1.1"
        with:
          config_file: ".yamllint.yaml"
          file_or_dir: "."
          strict: true

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Run ergebnis/composer-normalize"
        run: "composer normalize --ansi --dry-run"

      - name: "Cache cache directory for friendsofphp/php-cs-fixer"
        uses: "actions/cache@v5.0.4"
        with:
          path: ".build/php-cs-fixer/"
          key: "php-${{ matrix.php-version }}-php-cs-fixer-${{ github.ref_name }}"
          restore-keys: |
            php-${{ matrix.php-version }}-php-cs-fixer-main
            php-${{ matrix.php-version }}-php-cs-fixer-

      - name: "Run friendsofphp/php-cs-fixer"
        run: "vendor/bin/php-cs-fixer fix --ansi --config=.php-cs-fixer.php --diff --dry-run --show-progress=dots --verbose"

  dependency-analysis:
    name: "Dependency Analysis"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"
          tools: "phive"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Install dependencies with phive"
        uses: "ergebnis/.github/actions/phive/install@1.11.0"
        with:
          trust-gpg-keys: "0x2DF45277AEF09A2F,0x033E5F8D801A2F8D"

      - name: "Run maglnet/composer-require-checker"
        run: ".phive/composer-require-checker check --ansi --config-file=$(pwd)/composer-require-checker.json --verbose"

  mutation-tests:
    name: "Mutation Tests"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "xdebug"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Run mutation tests with Xdebug and infection/infection"
        env:
          XDEBUG_MODE: "coverage"
        run: "vendor/bin/infection --ansi --configuration=infection.json --logger-github"

  phar:
    name: "Phar"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    env:
      PHPUNIT_AGENT_REPORTER_PHAR: ".build/phar/phpunit-agent-reporter.phar"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, ctype, curl, dom, iconv, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          ini-values: "memory_limit=-1, phar.readonly=0"
          php-version: "${{ matrix.php-version }}"
          tools: "phive"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Remove incompatible dependencies with composer"
        run: "composer remove phpstan/extension-installer --ansi --dev --no-interaction --no-progress"

      - name: "Remove phpunit/phpunit with composer"
        run: "composer remove phpunit/phpunit --ansi --no-interaction --no-progress"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Remove git placeholder configuration with jq"
        run: "echo $(cat box.json | jq 'del(.git)') > box.json"

      - name: "Install dependencies with phive"
        uses: "ergebnis/.github/actions/phive/install@1.11.0"
        with:
          trust-gpg-keys: "0x2DF45277AEF09A2F,0x033E5F8D801A2F8D"

      - name: "Validate configuration for humbug/box"
        run: ".phive/box validate box.json --ansi"

      - name: "Compile phpunit-agent-reporter.phar with humbug/box"
        run: ".phive/box compile --ansi --config=box.json"

      - name: "Show info about phpunit-agent-reporter.phar with humbug/box"
        run: ".phive/box info ${{ env.PHPUNIT_AGENT_REPORTER_PHAR }} --ansi --list"

      - name: "Upload Phar"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "phpunit-agent-reporter-phar"
          overwrite: true
          path: "${{ env.PHPUNIT_AGENT_REPORTER_PHAR }}"
          retention-days: 1

  refactoring:
    name: "Refactoring"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Cache cache directory for rector/rector"
        uses: "actions/cache@v5.0.4"
        with:
          path: ".build/rector/"
          key: "php-${{ matrix.php-version }}-rector-${{ github.ref_name }}"
          restore-keys: |
            php-${{ matrix.php-version }}-rector-main
            php-${{ matrix.php-version }}-rector-

      - name: "Run automated refactoring with rector/rector"
        run: "vendor/bin/rector --ansi --config=rector.php --dry-run"

  security-analysis:
    name: "Security Analysis"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Check installed packages for security vulnerability advisories"
        run: "composer audit --ansi"

  static-code-analysis:
    name: "Static Code Analysis"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    strategy:
      matrix:
        php-version:
          - "8.1"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, opcache, pcntl, phar, posix, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Cache cache directory for phpstan/phpstan"
        uses: "actions/cache@v5.0.4"
        with:
          path: ".build/phpstan/"
          key: "php-${{ matrix.php-version }}-phpstan-${{ github.ref_name }}"
          restore-keys: |
            php-${{ matrix.php-version }}-phpstan-main
            php-${{ matrix.php-version }}-phpstan-

      - name: "Run phpstan/phpstan"
        run: "vendor/bin/phpstan --ansi --configuration=phpstan.neon --memory-limit=-1"

  tests:
    name: "Tests"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    needs:
      - "phar"

    strategy:
      fail-fast: false
      matrix:
        phpunit-version:
          - "10.0.0"

        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

        dependencies:
          - "lowest"
          - "highest"

        include:
          - phpunit-version: "11.0.0"
            php-version: "8.2"
            dependencies: "lowest"

          - phpunit-version: "11.0.0"
            php-version: "8.2"
            dependencies: "highest"

          - phpunit-version: "11.0.0"
            php-version: "8.3"
            dependencies: "lowest"

          - phpunit-version: "11.0.0"
            php-version: "8.3"
            dependencies: "highest"

          - phpunit-version: "11.0.0"
            php-version: "8.4"
            dependencies: "lowest"

          - phpunit-version: "11.0.0"
            php-version: "8.4"
            dependencies: "highest"

          - phpunit-version: "11.0.0"
            php-version: "8.5"
            dependencies: "lowest"

          - phpunit-version: "11.0.0"
            php-version: "8.5"
            dependencies: "highest"

          - phpunit-version: "12.0.0"
            php-version: "8.3"
            dependencies: "lowest"

          - phpunit-version: "12.0.0"
            php-version: "8.3"
            dependencies: "highest"

          - phpunit-version: "12.0.0"
            php-version: "8.4"
            dependencies: "lowest"

          - phpunit-version: "12.0.0"
            php-version: "8.4"
            dependencies: "highest"

          - phpunit-version: "12.0.0"
            php-version: "8.5"
            dependencies: "lowest"

          - phpunit-version: "12.0.0"
            php-version: "8.5"
            dependencies: "highest"

          - phpunit-version: "13.0.0"
            php-version: "8.4"
            dependencies: "lowest"

          - phpunit-version: "13.0.0"
            php-version: "8.4"
            dependencies: "highest"

          - phpunit-version: "13.0.0"
            php-version: "8.5"
            dependencies: "lowest"

          - phpunit-version: "13.0.0"
            php-version: "8.5"
            dependencies: "highest"

    env:
      PHPUNIT_AGENT_REPORTER_PHAR: ".build/phar/phpunit-agent-reporter.phar"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6.0.2"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          coverage: "none"
          extensions: "none, bcmath, ctype, curl, dom, iconv, intl, json, mbstring, phar, simplexml, tokenizer, xml, xmlwriter"
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Set up problem matchers for phpunit/phpunit"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/phpunit.json\""

      - name: "Validate composer.json and composer.lock"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@1.11.0"

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@v5.0.4"
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-phpunit-${{ matrix.phpunit-version }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-phpunit-${{ matrix.phpunit-version }}-"

      - name: "Remove incompatible dependencies with composer"
        run: "composer remove ergebnis/composer-normalize ergebnis/license ergebnis/php-cs-fixer-config ergebnis/phpstan-rules ergebnis/rector-rules infection/infection phpstan/extension-installer phpstan/phpstan phpstan/phpstan-deprecation-rules phpstan/phpstan-phpunit phpstan/phpstan-strict-rules rector/rector --ansi --dev --no-interaction --no-progress"

      - name: "Remove platform configuration with composer"
        run: "composer config platform.php --ansi --unset"

      - name: "Require phpunit/phpunit:^${{ matrix.phpunit-version }}"
        run: "composer require phpunit/phpunit:^${{ matrix.phpunit-version }} --ansi --no-interaction --no-progress --update-with-all-dependencies"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Run unit tests with phpunit/phpunit:10.0.0"
        if: "matrix.php-version == '8.1' && matrix.phpunit-version == '10.0.0' && matrix.dependencies == 'highest'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/Unit/phpunit.xml"

      - name: "Run end-to-end tests with phpunit/phpunit:10.0.0"
        if: "matrix.phpunit-version == '10.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/EndToEnd/PHPUnit10/phpunit.xml"

      - name: "Run end-to-end tests with phpunit/phpunit:11.0.0"
        if: "matrix.phpunit-version == '11.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/EndToEnd/PHPUnit11/phpunit.xml"

      - name: "Run end-to-end tests with phpunit/phpunit:12.0.0"
        if: "matrix.phpunit-version == '12.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/EndToEnd/PHPUnit12/phpunit.xml"

      - name: "Run end-to-end tests with phpunit/phpunit:13.0.0"
        if: "matrix.phpunit-version == '13.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/EndToEnd/PHPUnit13/phpunit.xml"

      - name: "Download Phar"
        uses: "actions/download-artifact@v8.0.1"
        with:
          name: "phpunit-agent-reporter-phar"
          path: "${{ env.PHPUNIT_AGENT_REPORTER_PHAR }}"

      - name: "Remove autoload configuration for composer"
        run: "php bin/remove-autoload-configuration.php"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@1.11.0"
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Run phar tests with phpunit/phpunit:10.0.0"
        if: "matrix.phpunit-version == '10.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/Phar/PHPUnit10/phpunit.xml"

      - name: "Run phar tests with phpunit/phpunit:11.0.0"
        if: "matrix.phpunit-version == '11.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/Phar/PHPUnit11/phpunit.xml"

      - name: "Run phar tests with phpunit/phpunit:12.0.0"
        if: "matrix.phpunit-version == '12.0.0'"
        run: "vendor/bin/phpunit --colors=always --configuration=test/Phar/PHPUnit12/phpunit.xml"

      - name: "Run phar tests with phpunit/phpunit:13.0.0"
        if: "matrix.phpunit-version == '13.0.0'"
